<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>RAG API</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; }
        input, button { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
        button { background: #000; color: #fff; border: none; cursor: pointer; }
        #resposta { background: #f5f5f5; padding: 15px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>📄 Pergunta ao teu PDF</h2>

    <p>1. Faz upload do PDF</p>
    <input type="file" id="pdf" accept=".pdf">
    <button onclick="uploadPDF()">Carregar PDF</button>
    <p id="upload-status"></p>

    <p>2. Faz uma pergunta</p>
    <input type="text" id="pergunta" placeholder="Escreve a tua pergunta...">
    <button onclick="perguntar()">Perguntar</button>

    <div id="resposta"></div>

    <script>
        const API = window.location.origin;

        async function uploadPDF() {
            const file = document.getElementById('pdf').files[0];
            if (!file) return alert('Escolhe um PDF!');
            const form = new FormData();
            form.append('file', file);
            document.getElementById('upload-status').innerText = 'A carregar...';
            const res = await fetch(`${API}/upload`, { method: 'POST', body: form });
            const data = await res.json();
            document.getElementById('upload-status').innerText = data.message;
        }

        async function perguntar() {
            const query = document.getElementById('pergunta').value;
            if (!query) return alert('Escreve uma pergunta!');
            document.getElementById('resposta').innerText = 'A pensar...';
            const res = await fetch(`${API}/ask`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ query })
            });
            const data = await res.json();
            document.getElementById('resposta').innerText = data.resposta;
        }
    </script>
</body>
</html>
